<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Baez Martial Arts — Inscríbete</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey:"AIzaSyC0GZUhbfipXCBeP6LJcXmKcHugNuG2f4E",
    authDomain:"masterbaez-crm.firebaseapp.com",
    databaseURL:"https://masterbaez-crm-default-rtdb.firebaseio.com",
    projectId:"masterbaez-crm",
    storageBucket:"masterbaez-crm.firebasestorage.app",
    messagingSenderId:"105620561253",
    appId:"1:105620561253:web:90516b7e8b25a3a736958c"
});
const db = firebase.database();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:linear-gradient(135deg,#1e1e3f,#12122a);border:1px solid rgba(196,30,58,0.4);border-radius:20px;padding:36px 32px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.6);position:relative}
#langBtn{position:absolute;top:14px;right:14px;background:transparent;border:1px solid rgba(255,215,0,0.5);border-radius:20px;color:#ffd700;font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer}
.logo-wrap{text-align:center;margin-bottom:20px}
.logo-circle{width:76px;height:76px;border-radius:50%;background:#fff;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden}
.logo-circle img{width:100%;height:100%;object-fit:cover}
#schoolName{color:#ffd700;font-size:20px;font-weight:700}
#schoolSub{color:#888;font-size:12px;margin-top:2px}
#tagline{font-size:18px;font-weight:700;text-align:center;margin:16px 0 4px;color:#c41e3a}
label{display:block;font-size:11px;color:#888;margin:12px 0 4px}
input,select{width:100%;padding:11px 14px;background:#0f0f23;border:1px solid #333;border-radius:10px;color:#fff;font-size:14px}
input:focus,select:focus{outline:none;border-color:#c41e3a}
select option{background:#1a1a2e}
#btnSubmit{width:100%;padding:14px;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;background:linear-gradient(135deg,#c41e3a,#8b0000)}
#btnSubmit:disabled{opacity:0.6;cursor:not-allowed}
#privacyTxt{text-align:center;font-size:11px;color:#555;margin-top:10px}
#errorMsg{color:#f87171;font-size:12px;text-align:center;margin-top:8px;min-height:14px}
#successBox{display:none;text-align:center;padding:20px 0}
#successBox .icon{font-size:56px;margin-bottom:12px}
#successBox h2{color:#4ade80;font-size:22px;margin-bottom:8px}
#successBox p{color:#ccc;font-size:14px;line-height:1.6}
#btnReset{margin-top:18px;padding:9px 22px;background:transparent;border:1px solid #444;border-radius:10px;color:#888;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="card">

  <button id="langBtn" onclick="toggleLang()">🇺🇸 English</button>

  <div class="logo-wrap">
    <div class="logo-circle" id="logoEl">🥋</div>
    <div id="schoolName">Master Baez Martial Arts</div>
    <div id="schoolSub">Sistema de Artes Marciales</div>
  </div>

  <div id="tagline">🥋 ¡Primera Clase GRATIS!</div>

  <div id="formBox">
    <label id="lblName">Nombre completo *</label>
    <input type="text" id="inpName" placeholder="Tu nombre completo">

    <label id="lblPhone">Teléfono *</label>
    <input type="tel" id="inpPhone" placeholder="(954) 000-0000">

    <label id="lblEmail">Email</label>
    <input type="email" id="inpEmail" placeholder="tucorreo@email.com">

    <label id="lblPromo">Programa / Promoción</label>
    <select id="inpPromo">
      <option value="">— Selecciona —</option>
    </select>

    <button id="btnSubmit" onclick="submitLead()">🥋 ¡Quiero mi Clase Gratis!</button>
    <div id="errorMsg"></div>
    <div id="privacyTxt">🔒 Tu información es privada y segura</div>
  </div>

  <div id="successBox">
    <div class="icon">🎉</div>
    <h2 id="successTitle">¡Gracias!</h2>
    <p id="successMsg">Recibimos tu información. ¡Te contactamos muy pronto!</p>
    <br>
    <p style="color:#ffd700;font-size:15px;font-weight:700" id="successSchool">🥋 Master Baez Martial Arts</p>
    <button id="btnReset" onclick="resetForm()">↩️ Enviar otro</button>
  </div>

</div>
<script>
// ── IDIOMA ────────────────────────────────────────────────────────
var lang = 'es';

var TX = {
  es: {
    langBtn:      '🇺🇸 English',
    schoolSub:    'Sistema de Artes Marciales',
    tagline:      '🥋 ¡Primera Clase GRATIS!',
    lblName:      'Nombre completo *',
    lblPhone:     'Teléfono *',
    lblEmail:     'Email',
    lblPromo:     'Programa / Promoción',
    optSelect:    '— Selecciona —',
    btnSubmit:    '🥋 ¡Quiero mi Clase Gratis!',
    privacy:      '🔒 Tu información es privada y segura',
    successTitle: '¡Gracias!',
    successMsg:   'Recibimos tu información. ¡Te contactamos muy pronto!',
    btnReset:     '↩️ Enviar otro',
    sending:      '⏳ Enviando...',
    errorEmpty:   '⚠️ Nombre y teléfono son obligatorios.'
  },
  en: {
    langBtn:      '🇪🇸 Español',
    schoolSub:    'Martial Arts System',
    tagline:      '🥋 First Class FREE!',
    lblName:      'Full Name *',
    lblPhone:     'Phone *',
    lblEmail:     'Email',
    lblPromo:     'Program / Promotion',
    optSelect:    '— Select —',
    btnSubmit:    '🥋 I Want My Free Class!',
    privacy:      '🔒 Your information is private and secure',
    successTitle: 'Thank You!',
    successMsg:   'We received your info. We will contact you very soon!',
    btnReset:     '↩️ Submit another',
    sending:      '⏳ Sending...',
    errorEmpty:   '⚠️ Name and phone are required.'
  }
};

function t(k) { return TX[lang][k] || TX['es'][k] || k; }

function applyLang() {
  document.getElementById('langBtn').textContent      = t('langBtn');
  document.getElementById('schoolSub').textContent    = t('schoolSub');
  document.getElementById('tagline').textContent      = t('tagline');
  document.getElementById('lblName').textContent      = t('lblName');
  document.getElementById('lblPhone').textContent     = t('lblPhone');
  document.getElementById('lblEmail').textContent     = t('lblEmail');
  document.getElementById('lblPromo').textContent     = t('lblPromo');
  document.getElementById('btnSubmit').textContent    = t('btnSubmit');
  document.getElementById('privacyTxt').textContent   = t('privacy');
  document.getElementById('successTitle').textContent = t('successTitle');
  document.getElementById('successMsg').textContent   = t('successMsg');
  document.getElementById('btnReset').textContent     = t('btnReset');
  document.getElementById('inpName').placeholder      = lang === 'en' ? 'Your full name'    : 'Tu nombre completo';
  document.getElementById('inpPhone').placeholder     = '(954) 000-0000';
  document.getElementById('inpEmail').placeholder     = lang === 'en' ? 'youremail@email.com' : 'tucorreo@email.com';
  // Primera opción del select
  var sel = document.getElementById('inpPromo');
  if (sel && sel.options.length > 0) sel.options[0].textContent = t('optSelect');
}

function applyTemplate() {
  if (!tmpl) return;
  var title = (lang === 'en' && tmpl.titleEN)      ? tmpl.titleEN      : (tmpl.title      || null);
  var btn   = (lang === 'en' && tmpl.buttonEN)     ? tmpl.buttonEN     : (tmpl.button     || null);
  var succ  = (lang === 'en' && tmpl.successMsgEN) ? tmpl.successMsgEN : (tmpl.successMsg || null);
  if (title) document.getElementById('tagline').textContent    = title;
  if (btn)   document.getElementById('btnSubmit').textContent  = btn;
  if (succ)  document.getElementById('successMsg').textContent = succ;
  if (tmpl.color) {
    document.getElementById('tagline').style.color = tmpl.color;
    document.getElementById('btnSubmit').style.background = 'linear-gradient(135deg,' + tmpl.color + ',#4a0000)';
  }
}

function toggleLang() {
  lang = (lang === 'es') ? 'en' : 'es';
  applyLang();
  applyTemplate();
}

// ── FIREBASE / INIT ───────────────────────────────────────────────
var params     = new URLSearchParams(window.location.search);
var instrId    = params.get('instructor') || 'admin';
var storageKey = (instrId === 'admin' ? 'crmData' : 'crmData_' + instrId).replace(/[.#$\[\]]/g,'_');

async function init() {
  var crmData = null;
  try {
    var snap = await db.ref(storageKey).get();
    if (snap.exists()) crmData = snap.val();
  } catch(e) {}

  // Nombre de la escuela
  var cfg = (crmData && crmData.config) ? crmData.config : {};
  if (cfg.companyName) {
    document.getElementById('schoolName').textContent  = cfg.companyName;
    document.getElementById('successSchool').textContent = '🥋 ' + cfg.companyName;
    document.title = cfg.companyName + ' — Inscríbete';
  }
  if (cfg.logo) document.getElementById('logoEl').innerHTML = '<img src="'+cfg.logo+'">';

  // Cargar template del CRM
  if (crmData && crmData.formTemplates) {
    var ftRaw = crmData.formTemplates;
    var ftArr = Array.isArray(ftRaw) ? ftRaw : Object.values(ftRaw).filter(function(v){ return v && v.name; });
    if (ftArr.length > 0) tmpl = ftArr[0];
  }

  // Aplicar template encima del idioma
  applyTemplate();

  // Programas en el dropdown
  var programs = [];
  if (cfg.programs) {
    programs = Array.isArray(cfg.programs) ? cfg.programs : Object.values(cfg.programs);
  }
  if (programs.length > 0) {
    var sel = document.getElementById('inpPromo');
    sel.innerHTML = '<option value="">' + t('optSelect') + '</option>';
    programs.forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
  }
}
init();

// ── ENVIAR ────────────────────────────────────────────────────────
async function submitLead() {
  var name  = document.getElementById('inpName').value.trim();
  var phone = document.getElementById('inpPhone').value.trim();
  var email = document.getElementById('inpEmail').value.trim();
  var promo = document.getElementById('inpPromo').value;

  document.getElementById('errorMsg').textContent = '';
  if (!name || !phone) {
    document.getElementById('errorMsg').textContent = t('errorEmpty');
    return;
  }

  var btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = t('sending');

  try {
    await db.ref(storageKey + '/leads').push({
      id:        'lead_' + Date.now(),
      name:      name,
      phone:     phone,
      email:     email,
      program:   promo,
      source:    'Formulario Web',
      stage:     'nuevo',
      status:    'nuevo',
      createdAt: new Date().toISOString().split('T')[0],
      instrId:   instrId
    });
  } catch(e) { console.warn('Firebase:', e); }

  document.getElementById('formBox').style.display    = 'none';
  document.getElementById('successBox').style.display = 'block';
}

// ── RESET ─────────────────────────────────────────────────────────
function resetForm() {
  document.getElementById('inpName').value  = '';
  document.getElementById('inpPhone').value = '';
  document.getElementById('inpEmail').value = '';
  document.getElementById('inpPromo').selectedIndex = 0;
  document.getElementById('errorMsg').textContent = '';
  var btn = document.getElementById('btnSubmit');
  btn.disabled = false;
  btn.textContent = t('btnSubmit');
  document.getElementById('successBox').style.display = 'none';
  document.getElementById('formBox').style.display    = 'block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
