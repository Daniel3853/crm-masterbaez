<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QR Cliente</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0d0d0d;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* ── LOADER ── */
#loaderWrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
.spinner{width:48px;height:48px;border:4px solid #333;border-top-color:#e8ff3c;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{color:#666;font-size:14px;}

/* ── CARD ── */
#cardWrap{display:none;flex-direction:column;align-items:center;padding:24px 20px;max-width:400px;width:100%;}
.card-logo{width:80px;height:80px;border-radius:20px;object-fit:contain;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;overflow:hidden;}
.card-logo img{width:100%;height:100%;object-fit:contain;}
.card-name{font-size:28px;font-weight:800;text-align:center;margin-bottom:4px;letter-spacing:-.5px;}
.card-biz{font-size:14px;color:#888;text-align:center;margin-bottom:6px;}
.card-type-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:24px;}
.card-msg{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:16px;font-size:14px;color:#ccc;line-height:1.6;text-align:center;margin-bottom:20px;max-width:340px;width:100%;}
.card-qr{background:#fff;padding:12px;border-radius:16px;margin-bottom:20px;}
.card-qr img{width:180px;height:180px;display:block;}
.card-info{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;margin-bottom:24px;}
.card-info-row{display:flex;align-items:center;gap:10px;background:#1a1a1a;border-radius:10px;padding:10px 14px;}
.card-info-icon{font-size:18px;flex-shrink:0;}
.card-info-text{font-size:13px;color:#ccc;word-break:break-all;}
.action-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:340px;padding:16px;border-radius:14px;font-size:16px;font-weight:800;text-decoration:none;border:none;cursor:pointer;transition:opacity .15s;margin-bottom:10px;}
.action-btn:hover{opacity:.85;}
.btn-wa{background:#25D366;color:#fff;}
.btn-sms{background:#2563eb;color:#fff;}
.btn-link{background:#7c3aed;color:#fff;}
.powered{margin-top:24px;font-size:11px;color:#444;text-align:center;}
.powered span{color:#e8ff3c;}

/* ── BLOCKED ── */
#blockedWrap{display:none;flex-direction:column;align-items:center;padding:40px 24px;max-width:380px;width:100%;text-align:center;}
.blocked-icon{font-size:64px;margin-bottom:20px;}
.blocked-title{font-size:24px;font-weight:800;margin-bottom:10px;color:#f87171;}
.blocked-sub{font-size:14px;color:#666;line-height:1.7;max-width:300px;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loaderWrap">
  <div class="spinner"></div>
  <div class="loader-text">Verificando...</div>
</div>

<!-- CARD -->
<div id="cardWrap">
  <div class="card-logo" id="cardLogo">🪪</div>
  <div class="card-name" id="cardName"></div>
  <div class="card-biz" id="cardBiz"></div>
  <span class="card-type-badge" id="cardTypeBadge"></span>
  <div class="card-msg" id="cardMsg" style="display:none"></div>
  <div class="card-qr" id="cardQrWrap" style="display:none">
    <img id="cardQrImg" src="" alt="QR"/>
  </div>
  <div class="card-info" id="cardInfo"></div>
  <a class="action-btn" id="cardActionBtn" href="#" target="_blank">Contactar</a>
  <div class="powered">Powered by <span>Master Baez CRM</span></div>
</div>

<!-- BLOCKED -->
<div id="blockedWrap">
  <div class="blocked-icon">🔒</div>
  <div class="blocked-title">QR No Disponible</div>
  <div class="blocked-sub">Este código QR ha sido desactivado temporalmente.<br/>Por favor contacta al administrador.</div>
</div>

<script>
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDpjqJFZxh1ErjbfTJ8nq-uzB3oHXDo-iA",
  authDomain:        "crm-leads-baez.firebaseapp.com",
  databaseURL:       "https://crm-leads-baez-default-rtdb.firebaseio.com",
  projectId:         "crm-leads-baez",
  storageBucket:     "crm-leads-baez.firebasestorage.app",
  messagingSenderId: "583732725999",
  appId:             "1:583732725999:web:b38aa0a3ffc9e809c3b31a"
};

firebase.initializeApp(FIREBASE_CONFIG);
var db = firebase.database();

var params = new URLSearchParams(window.location.search);
var qrId   = params.get('id');

function showBlocked(){
  document.getElementById('loaderWrap').style.display = 'none';
  document.getElementById('blockedWrap').style.display = 'flex';
}

function showCard(c){
  document.getElementById('loaderWrap').style.display = 'none';

  // Name & biz
  document.getElementById('cardName').textContent = c.name || '';
  var biz = c.bizName || c.company || '';
  var bizEl = document.getElementById('cardBiz');
  bizEl.textContent = biz;
  bizEl.style.display = biz ? '' : 'none';

  // Logo
  var logoEl = document.getElementById('cardLogo');
  if(c.logoUrl){
    logoEl.innerHTML = '<img src="'+c.logoUrl+'" alt="logo"/>';
  }

  // Type badge
  var badge = document.getElementById('cardTypeBadge');
  if(c.type==='whatsapp'){
    badge.textContent = '📲 WhatsApp'; badge.style.background='#14532d'; badge.style.color='#4ade80';
  } else if(c.type==='sms'){
    badge.textContent = '💬 SMS'; badge.style.background='#1e3a5f'; badge.style.color='#93c5fd';
  } else {
    badge.textContent = '🌐 Link'; badge.style.background='#3b0764'; badge.style.color='#d8b4fe';
  }

  // Message
  if(c.msg){
    document.getElementById('cardMsg').textContent = '💬 "'+c.msg+'"';
    document.getElementById('cardMsg').style.display = '';
  }

  // Info rows
  var info = '';
  if(c.phone && c.type!=='link'){
    info += '<div class="card-info-row"><span class="card-info-icon">📱</span><span class="card-info-text">+'+c.phone.replace(/\D/g,'')+'</span></div>';
  }
  if(c.link && c.type==='link'){
    info += '<div class="card-info-row"><span class="card-info-icon">🌐</span><span class="card-info-text">'+c.link+'</span></div>';
  }
  if(c.email){
    info += '<div class="card-info-row"><span class="card-info-icon">✉️</span><span class="card-info-text">'+c.email+'</span></div>';
  }
  if(c.notes){
    info += '<div class="card-info-row"><span class="card-info-icon">📝</span><span class="card-info-text">'+c.notes+'</span></div>';
  }
  document.getElementById('cardInfo').innerHTML = info;

  // Action button
  var btn = document.getElementById('cardActionBtn');
  var dest = buildUrl(c);
  btn.href = dest;
  if(c.type==='whatsapp'){
    btn.textContent = '📲 Abrir WhatsApp'; btn.className='action-btn btn-wa';
  } else if(c.type==='sms'){
    btn.textContent = '💬 Enviar SMS'; btn.className='action-btn btn-sms';
  } else {
    btn.textContent = '🌐 Abrir Link'; btn.className='action-btn btn-link';
  }

  // QR of the destination (for sharing)
  if(dest){
    var qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(dest);
    document.getElementById('cardQrImg').src = qrSrc;
    document.getElementById('cardQrWrap').style.display = '';
  }

  document.getElementById('cardWrap').style.display = 'flex';

  // Auto-redirect after 2 seconds if type is whatsapp or sms
  if(c.type==='whatsapp' || c.type==='sms'){
    setTimeout(function(){ window.location.href = dest; }, 2000);
  } else if(c.type==='link' && dest){
    setTimeout(function(){ window.location.href = dest; }, 2000);
  }
}

function buildUrl(c){
  if(c.type==='whatsapp'){
    var num = (c.phone||'').replace(/\D/g,'');
    return 'https://wa.me/'+num+(c.msg?'?text='+encodeURIComponent(c.msg):'');
  } else if(c.type==='sms'){
    var num2 = (c.phone||'').replace(/\D/g,'');
    return 'sms:+'+num2+(c.msg?'?body='+encodeURIComponent(c.msg):'');
  } else {
    return c.link||'';
  }
}

// Main — load QR record from Firebase
if(!qrId){
  showBlocked();
} else {
  db.ref('qrClientes/'+qrId).once('value', function(snap){
    if(!snap.exists()){
      showBlocked(); return;
    }
    var c = snap.val();
    if(c.qrEnabled === false){
      showBlocked(); return;
    }
    showCard(c);
  }).catch(function(){
    showBlocked();
  });
}
</script>
</body>
</html>
